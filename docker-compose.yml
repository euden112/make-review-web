services:
  postgres:
    image: postgres:15-alpine
    container_name: capstone_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: review_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/03_migration_sprint2.sql:/docker-entrypoint-initdb.d/03_migration_sprint2.sql
      - ./database/04_migration_sprint3_m001.sql:/docker-entrypoint-initdb.d/04_migration_sprint3_m001.sql
      - ./database/05_migration_sprint3_m002.sql:/docker-entrypoint-initdb.d/05_migration_sprint3_m002.sql
      - ./database/06_migration_sprint3_m003.sql:/docker-entrypoint-initdb.d/06_migration_sprint3_m003.sql
      - ./database/07_migration_sprint3_m005.sql:/docker-entrypoint-initdb.d/07_migration_sprint3_m005.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: capstone_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: capstone_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # Note: Ollama requires significant resources. 
    # You may need to adjust docker memory settings.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    image: python:3.11-slim
    container_name: capstone_backend
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - .:/workspace
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/review_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOCAL_MAP_MODEL=gemma3:4b
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONPATH=/workspace/backend:/workspace/ai-pipeline
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

        
volumes:
  postgres_data:
  redis_data:
  ollama_data:
