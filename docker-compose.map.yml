# 로컬 Map 단계 전용 Ollama (GPU 가속)
#
# Map/Reduce 분리 구조에서 Map은 클라우드가 아닌 로컬에서 실행한다
# (cloud-deploy: docker-compose.yml에서 ollama 제거). CPU 배포 제약이
# 사라졌으므로 로컬 GPU를 사용해 더 큰 Map 모델을 돌린다.
#
# 사용법:
#   docker compose -f docker-compose.map.yml up -d        # Ollama 기동
#   docker compose -f docker-compose.map.yml exec ollama ollama pull qwen2.5:7b
#   python run_map_pipeline.py --cloud-url https://xxx.trycloudflare.com --all
#
# 전제: NVIDIA 드라이버 + (Docker Desktop/WSL2의) nvidia container runtime.
# GPU가 없는 호스트라면 아래 deploy 블록을 주석 처리하면 CPU로 폴백된다.
services:
  ollama:
    image: ollama/ollama:latest
    container_name: capstone_ollama_map
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      # GPU 1장(16GB)에 모델 1개 상주. 동시 로드/병렬 요청 억제로 OOM 방지.
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_MAX_LOADED_MODELS=1
      # 동시 추론 슬롯. 기본 1(안전). 병렬 처리 시 .env에서 2 등으로 오버라이드.
      # 단 NUM_PARALLEL=N이면 모델 컨텍스트가 슬롯으로 분할되므로 OLLAMA_NUM_CTX를
      # 충분히(예: 8192) 키워 슬롯당 컨텍스트가 프롬프트를 담게 해야 truncation이 없다.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      # Map 청크당 추론 속도 향상(메모리 대역폭 병목 완화). flash attention +
      # KV 캐시 8bit 양자화로 청크당 ~30~60초 → ~10~22초. 품질 무손실.
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
    # GPU 예약: nvidia 런타임이 있어야 한다. CPU 폴백 시 이 블록을 주석 처리.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
